<meta name="description" content="TidyHacks — handpicked Amazon home, kitchen and cleaning gadgets. Search the products and grab the links.">
<meta property="og:title" content="TidyHacks">
<meta property="og:description" content="Sharing the best Amazon finds ✨">
<meta property="og:type" content="website">
<style>
  :root {
    --purple:#8b6ff0; --purple-dark:#6c4fd6; --purple-soft:#a78bfa;
    --bg:#baaff5; --card:#ffffff; --ink:#1f1a33; --muted:#6b6480;
    --line:#ece8fb; --shadow:0 6px 20px rgba(0,0,0,0.22);
  }
  * { box-sizing:border-box; }
  html, body { margin:0; }
  body {
    font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);
    background: var(--bg);
    min-height:100vh;
  }
  .wrap { max-width:680px; margin:0 auto; padding:28px 18px 60px; }
  @media (max-width:480px){ .wrap { padding:24px 10px 60px; } }

  /* ---- header ---- */
  .profile { text-align:center; color:#fff; }
  .avatar {
    width:128px; height:128px; border-radius:50%; object-fit:cover;
    border:4px solid #fff; box-shadow:var(--shadow); margin:6px auto 14px; display:block;
  }
  .name { font-size:30px; font-weight:800; letter-spacing:-.5px; margin:0; }
  .tagline { font-size:16px; margin:8px 0 16px; color:rgba(255,255,255,0.85); }
  .socials { display:flex; justify-content:center; gap:18px; margin-bottom:6px; }
  .socials a {
    width:42px; height:42px; border-radius:50%; background:rgba(255,255,255,.55);
    display:flex; align-items:center; justify-content:center; color:#2a2342;
    transition:.15s; text-decoration:none;
  }
  .socials a:hover { background:#fff; transform:translateY(-2px); }
  .socials svg { width:20px; height:20px; display:block; }

  /* ---- search ---- */
  .banner {
    background:#fff; border-radius:14px; box-shadow:var(--shadow);
    text-align:center; font-weight:700; padding:16px; margin:26px 0 14px; color:var(--ink);
  }
  .search {
    position:relative; margin-bottom:22px;
  }
  .search input {
    width:100%; border:none; border-radius:30px; background:#fff;
    padding:16px 46px 16px 48px; font:inherit; color:var(--ink);
    box-shadow:var(--shadow); outline:2px solid transparent; transition:outline-color .15s;
  }
  .search input:focus { outline-color:var(--purple); }
  .search .icon { position:absolute; left:18px; top:50%; transform:translateY(-50%); color:var(--muted); width:18px; height:18px; }
  .search .clear {
    position:absolute; right:12px; top:50%; transform:translateY(-50%);
    border:none; background:#efeafd; color:var(--muted); width:28px; height:28px;
    border-radius:50%; cursor:pointer; font-size:15px; line-height:1; display:none;
  }
  .search .clear:hover { background:#e3dbfb; }
  .search.has-text .clear { display:block; }

  /* ---- grid ---- */
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  @media (max-width:480px){ .grid { grid-template-columns:repeat(2,1fr); gap:10px; } }

  .card {
    display:flex;
    border-radius:14px; overflow:hidden; box-shadow:var(--shadow);
    border:1.5px solid rgba(255,255,255,0.55);
    transition:transform .15s, box-shadow .15s;
  }
  .card:hover { transform:translateY(-3px); box-shadow:0 12px 30px rgba(60,40,120,.18); }
  .card-link {
    display:flex; flex-direction:column; flex:1 1 auto;
    text-decoration:none; color:inherit;
  }
  .thumb {
    position:relative; flex:1 1 auto; min-height:0; aspect-ratio:5/6;
    background:#f3f0fb url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="%23cfc6ee"><rect width="40" height="40" rx="6"/></svg>') center/40px no-repeat;
  }
  .thumb img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .card-label {
    background:var(--purple); color:#fff; text-align:center;
    padding:9px 8px; font-size:13px; font-weight:500; line-height:1.25;
    letter-spacing:0.01em; transition:background .15s, color .15s;
    min-height:2.5em; display:flex; align-items:center; justify-content:center;
  }
  .card:hover .card-label { background:#fff; color:var(--purple); }

  .empty { text-align:center; color:var(--muted); padding:40px 10px; grid-column:1/-1; }
  .footer { text-align:center; color:#7c7498; font-size:12px; margin-top:34px; }
  .footer .disc { max-width:520px; margin:8px auto 0; line-height:1.5; }
  .footer .trading { max-width:520px; margin:6px auto 0; font-size:10px; color:#a89fbe; line-height:1.5; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="profile">
      <img class="avatar" src="images/avatar.png" alt="TidyHacks logo">
      <h1 class="name">Tidy Hacks</h1>
      <p class="tagline">✨ Sharing the best Amazon finds ✨</p>
      <nav class="socials" aria-label="Social links">
        <a href="https://instagram.com/tidyhacks_" target="_blank" rel="noopener" aria-label="Instagram">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/></svg>
        </a>
        <a href="https://tiktok.com/@tidyhacks_" target="_blank" rel="noopener" aria-label="TikTok">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 3c.3 2.1 1.6 3.7 3.7 3.9v2.4c-1.2.1-2.4-.2-3.5-.8v5.9c0 3-2.2 5.2-5.1 5.2A5 5 0 0 1 6.5 14c.1-2.6 2.2-4.7 4.8-4.7.3 0 .5 0 .8.1v2.5c-.3-.1-.5-.1-.8-.1a2.3 2.3 0 0 0 .1 4.6 2.3 2.3 0 0 0 2.3-2.4V3h2.8z"/></svg>
        </a>
        <a href="https://www.youtube.com/@tidyhacks_" target="_blank" rel="noopener" aria-label="YouTube">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23 7s-.3-2-1.2-2.8c-1.1-1.2-2.4-1.2-3-1.3C16.6 2.8 12 2.8 12 2.8s-4.6 0-6.8.2c-.6.1-1.9.1-3 1.3C1.3 5 1 7 1 7S.8 9.2.8 11.5v2.1c0 2.2.2 4.5.2 4.5s.3 2 1.2 2.8c1.1 1.2 2.6 1.1 3.3 1.2C7.6 22.2 12 22.2 12 22.2s4.6 0 6.8-.3c.6-.1 1.9-.1 3-1.3.9-.8 1.2-2.8 1.2-2.8s.2-2.2.2-4.5v-2C23.2 9.2 23 7 23 7zM9.7 15.5V8.3l8.1 3.6-8.1 3.6z"/></svg>
        </a>
        <a href="https://www.facebook.com/profile.php?id=61590217031403" target="_blank" rel="noopener" aria-label="Facebook">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
        </a>
        <a href="mailto:info@tidyhacks.co" aria-label="Email">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg>
        </a>
      </nav>
    </div>

    <div class="banner">▼ Search all the products below ▼</div>

    <div class="search" id="searchWrap">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search" type="search" placeholder="Search products…" autocomplete="off" aria-label="Search products">
      <button class="clear" id="clear" aria-label="Clear search">✕</button>
    </div>

    <div class="grid" id="grid"></div>

    <div class="footer">
      <div>© <span id="year"></span> TidyHacks</div>
      <div class="disc">As an Amazon Associate, TidyHacks earns from qualifying purchases.</div>
      <div class="trading">TidyHacks is a trading style of Corporate Home Away South Limited &middot; <a href="legal.html" style="color:inherit;">Legal</a></div>
    </div>
  </div>

<script>
  const grid = document.getElementById('grid');
  const search = document.getElementById('search');
  const clearBtn = document.getElementById('clear');
  const searchWrap = document.getElementById('searchWrap');
  document.getElementById('year').textContent = new Date().getFullYear();

  let products = [];

  function render(list) {
    if (!list.length) {
      grid.innerHTML = '<div class="empty">No products match your search.</div>';
      return;
    }
    grid.innerHTML = list.map(p => {
      const link = (p.links && p.links.genius) || (p.links && p.links.us) || (p.links && p.links.uk) || '#';
      const img = p.image_url
        ? `<img src="${p.image_url}" alt="${escapeHtml(p.product_name)}" loading="lazy" referrerpolicy="no-referrer">`
        : '';
      return `
        <article class="card" data-name="${escapeHtml(p.product_name)}" data-niche="${escapeHtml(p.niche || '')}" data-asin="${escapeHtml(p.asin || '')}">
          <a class="card-link" data-click="card" href="${link}" target="_blank" rel="noopener sponsored nofollow" aria-label="View ${escapeHtml(p.product_name)} on Amazon">
            <div class="thumb">${img}</div>
            <div class="card-label">${escapeHtml(p.product_name)}</div>
          </a>
        </article>`;
    }).join('');
  }

  function filter() {
    const q = search.value.trim().toLowerCase();
    searchWrap.classList.toggle('has-text', q.length > 0);
    if (!q) return render(products);
    render(products.filter(p =>
      (p.product_name || '').toLowerCase().includes(q) ||
      (p.niche || '').toLowerCase().includes(q)
    ));
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c =>
      ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
  }

  search.addEventListener('input', filter);
  clearBtn.addEventListener('click', () => { search.value = ''; filter(); search.focus(); });

  // Fire a named PostHog event on every Amazon link click (image or button),
  // so analytics can break down clicks by product without selector hunting.
  grid.addEventListener('click', e => {
    const link = e.target.closest('a[data-click]');
    if (!link) return;
    const card = link.closest('.card');
    if (!card || !window.posthog) return;
    posthog.capture('amazon_click', {
      product_name: card.dataset.name,
      niche: card.dataset.niche,
      asin: card.dataset.asin,
      click_target: link.dataset.click,   // 'image' or 'button'
      destination: link.href,
    });
  });

  fetch('products.json')
    .then(r => r.json())
    .then(data => { products = data.products || []; render(products); })
    .catch(() => { grid.innerHTML = '<div class="empty">Could not load products.</div>'; });
</script>
</body>
</html>
